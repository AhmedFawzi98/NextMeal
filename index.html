<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link href="/css/style.css" rel="stylesheet" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
            rel="stylesheet"
        />
        <title>NextMeal</title>
        <link rel="icon" href="/img/logo-and-fav-icon/fav.png" />
    </head>
    <body>
        <header class="section-header">
            <img src="/img/logo-and-fav-icon/logo.png" class="header-logo" />
            <nav class="header-nav">
                <ul class="header-nav-list">
                    <li><a class="header-nav-link" href="#">Section 1</a></li>
                    <li><a class="header-nav-link" href="#">Section 2</a></li>
                    <li><a class="header-nav-link" href="#">Section 3</a></li>
                    <li><a class="header-nav-link" href="#">Section 4</a></li>
                    <li>
                        <a class="header-nav-link nav-cta" href="#"
                            >Get Started</a
                        >
                    </li>
                </ul>
            </nav>
        </header>
        <main>
            <section class="section-hero">
                <div class="hero">
                    <div class="hero-img-container">
                        <img
                            src="/img/hero/hero-image.png"
                            alt="image of food"
                            class="hero-img"
                        />
                    </div>

                    <div class="hero-content">
                        <h1>Eat better every day, without overthinking it.</h1>
                        <p>
                            Personalized daily meal plans and fresh deliveries
                            built around your schedule, your goals, and your
                            taste
                        </p>
                        <div class="hero-actions">
                            <a href="#" class="btn btn-cta-primary"
                                >Start Now</a
                            >
                            <a href="#" class="btn btn-cta-secondary"
                                >Learn More</a
                            >
                        </div>
                        <div class="customers">
                            <div class="customers-images">
                                <img
                                    class="customer-img"
                                    src="/img/people/customer-1.jpg"
                                    alt="customer photo"
                                />
                                <img
                                    src="/img/people/customer-2.jpg"
                                    alt="customer photo"
                                />
                                <img
                                    src="/img/people/customer-3.jpg"
                                    alt="customer photo"
                                />
                                <img
                                    src="/img/people/customer-4.jpg"
                                    alt="customer photo"
                                />
                                <img
                                    src="/img/people/customer-5.jpg"
                                    alt="customer photo"
                                />
                                <img
                                    src="/img/people/customer-6.jpg"
                                    alt="customer photo"
                                />
                            </div>
                            <div class="customers-text">
                                <strong>300,000+</strong> meals delivered in the
                                past year alone.
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </body>
</html>
